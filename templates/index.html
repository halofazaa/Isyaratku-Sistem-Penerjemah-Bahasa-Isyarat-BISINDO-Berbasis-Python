<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isyaratku</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #e8efff; 
            overflow: hidden; 
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .equal-box {
            aspect-ratio: 4 / 3; 
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-6 md:p-12">

    <div class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-2 gap-8 items-center">

        <div class="relative equal-box bg-black rounded-[2.5rem] overflow-hidden border-4 border-[#ffffff] glass-panel">
            <img src="/video_feed" class="w-full h-full object-cover bg-black">

            <div class="absolute top-6 left-6 flex items-center gap-2 bg-black/60 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>
                <span class="text-white text-[10px] font-bold tracking-widest uppercase">Sistem Mendeteksi Isyarat</span>
            </div>

            <div class="absolute bottom-6 left-6">
                <div class="relative group">
                    <div id="confidence-ring" class="absolute -inset-1 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full opacity-75 blur transition duration-200"></div>
                    <div class="relative w-20 h-20 bg-white rounded-full flex items-center justify-center border-4 border-slate-100 shadow-xl">
                        <span id="current-letter" class="text-4xl font-black text-slate-800">-</span>
                    </div>
                    <div class="absolute -top-1 -right-1 bg-[#38bdf8] text-white text-[10px] font-bold px-2 py-1 rounded-full border-2 border-white">
                        <span id="confidence">0%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-panel equal-box rounded-[2.5rem] overflow-hidden">
            
            <div class="bg-[#38bdf8] p-6 text-center">
                <h2 class="text-white text-sm font-black tracking-[0.25em] uppercase drop-shadow-sm">Hasil Terjemahan</h2>
            </div>

            <div class="flex-1 p-8 flex flex-col bg-white overflow-hidden">
                <div class="flex-1 overflow-y-auto custom-scrollbar flex items-center justify-center text-center">
                    <p id="translated-text" class="text-slate-800 text-5xl md:text-6xl font-extrabold leading-tight break-words transition-all duration-200">
                        ...
                    </p>
                </div>
            </div>

            <div class="p-6 bg-slate-50 border-t border-slate-100">
                <div class="grid grid-cols-4 gap-4">
                    <button onclick="addSpace()" class="col-span-2 bg-white border-2 border-slate-200 text-slate-700 py-4 rounded-2xl font-bold text-sm hover:bg-slate-50 hover:border-blue-400 active:scale-95 transition-all shadow-sm uppercase tracking-widest">
                        Spasi
                    </button>
                    
                    <button onclick="clearText()" class="col-span-1 bg-red-50 border-2 border-red-100 text-red-500 rounded-2xl flex items-center justify-center hover:bg-red-100 active:scale-90 transition-all shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>

                    <button onclick="speakText()" class="col-span-1 bg-[#38bdf8] text-white rounded-2xl flex items-center justify-center hover:bg-blue-600 active:scale-90 shadow-lg shadow-blue-200 transition-all">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const socket = io();
        let mainText = "";
        let lastLetter = "";
        let stabilityCounter = 0;

        socket.on('update_letter', (data) => {
            const letterEl = document.getElementById('current-letter');
            const confEl = document.getElementById('confidence');
            const ringEl = document.getElementById('confidence-ring');

            letterEl.innerText = data.letter;
            confEl.innerText = data.confidence + "%";

            const conf = parseInt(data.confidence);
            
            if (conf > 80) {
                ringEl.classList.replace('opacity-75', 'opacity-100');

                if (data.letter === lastLetter) {
                    stabilityCounter++;
                } else {
                    lastLetter = data.letter;
                    stabilityCounter = 0;
                }

                let threshold = conf > 95 ? 4 : 10;

                if (stabilityCounter >= threshold) {
                    mainText += data.letter;
                    updateScreen();
                    stabilityCounter = -15; 
                    
                    const display = document.getElementById('translated-text');
                    display.style.transform = "scale(1.1)";
                    setTimeout(() => display.style.transform = "scale(1)", 150);
                }
            } else {
                ringEl.classList.replace('opacity-100', 'opacity-75');
            }
        });

        function updateScreen() {
            const el = document.getElementById('translated-text');
            el.innerText = mainText || "...";
            el.scrollTop = el.scrollHeight;
        }

        function addSpace() { mainText += " "; updateScreen(); }
        function clearText() { mainText = ""; updateScreen(); }
        function speakText() {
            if (!mainText || mainText === "...") return;
            const msg = new SpeechSynthesisUtterance(mainText);
            msg.lang = 'id-ID'; 
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
